services:
  api-gateway:
    image: api-gateway:latest
    ports:
      - "80:3000"
    environment:
      - USER_SERVICE_URL=http://user-service:8000
    restart: unless-stopped

  user-service:
    image: user-service:latest
    ports:
      - "8001:8000"
    volumes:
      - user-data:/data
    restart: unless-stopped

volumes:
  user-data:
