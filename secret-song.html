<!DOCTYPE html>
<html>
<head>
    <title>Secret Song</title>
</head>
<body>
    <div class="user-section" id="secret">
        <div class="section-title">
            <i class="fas fa-music"></i>
            <h2>🎵 Secret Song</h2>
            <span class="stat-label" style="font-size:0.8rem;">Enter the secret code</span>
        </div>
        <div class="user-form" style="text-align: center;">
            <div class="form-group">
                <input type="password" id="secretCode" placeholder="Enter secret code" style="text-align: center; font-family: monospace;">
            </div>
            <button class="btn" onclick="unlockSong()">
                <i class="fas fa-key"></i> Unlock Song
            </button>
            <div id="songPlayer" style="margin-top: 20px; display: none;">
                <div style="background: rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden;">
                    <iframe id="videoFrame" width="100%" height="315" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <p style="margin-top: 10px; font-size: 0.9rem;">🎶 Enjoy the song! 🎶</p>
            </div>
        </div>
    </div>
</body>
</html>
